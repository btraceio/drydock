# Ghostty config for managed terminals, DARK theme.
# Mirrors theme-dark.css: background == -cpm-main so the claude session
# blends seamlessly into the app instead of standing out as a darker box.
# Loaded exclusively (the user's own ~/.config/ghostty is never read).
background = #161514
foreground = #ece9e5
cursor-color = #d97757
cursor-text = #161514
selection-background = #3a3733
selection-foreground = #ece9e5
window-padding-x = 12
window-padding-y = 8
palette = 0=#2a2826
palette = 1=#e06c6c
palette = 2=#6cc07a
palette = 3=#d9a03a
palette = 4=#6c9ce0
palette = 5=#b07ad9
palette = 6=#5fb3b3
palette = 7=#a8a29b
palette = 8=#6f6a63
palette = 9=#e88a8a
palette = 10=#8ad098
palette = 11=#e6b566
palette = 12=#8ab4ea
palette = 13=#c49ae2
palette = 14=#7cc7c7
palette = 15=#ece9e5
