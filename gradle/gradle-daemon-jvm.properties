# Daemon JVM criteria (Gradle 8.11 incubating; replaces the old
# machine-specific org.gradle.java.home pin in gradle.properties).
#
# Gradle 8.11.1 itself cannot run on JDK 26 (its own version parser throws on
# "26.0.1" -- see README.md, "Toolchain notes"). This does NOT affect what the
# application is compiled/run against: java{ toolchain{} } in app/build.gradle.kts
# still targets 26, and every task that runs application code uses a JDK 26
# javaLauncher. This file only selects the JVM Gradle's own daemon runs on.
#
# Why 17 and not 24: the `test` task fails to configure under a JDK 24 daemon
#   Could not create an instance of type DefaultReportContainer > Type T not present
# reproduced on a clean checkout with zero application code (a Gradle/JDK-24
# toolchain-internals incompatibility, not a project bug). JDK 17 does not hit
# it and is otherwise equivalent for running Gradle itself.
#
# The JDK 17 installation is located via Gradle's standard toolchain detection
# (no absolute path, works on any dev machine with a JDK 17 installed). No
# toolchainDownloadUrl is configured, so a machine without any local JDK 17
# fails with a clear "no compatible JVM" error -- install one (e.g. via sdkman
# or from /Library/Java/JavaVirtualMachines) to proceed.
toolchainVersion=17
